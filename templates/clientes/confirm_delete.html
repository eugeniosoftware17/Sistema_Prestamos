{% extends "base.html" %}

{% block title %}Eliminar cliente{% endblock %}

{% block content %}
<h1>Eliminar cliente</h1>
<p>¿Seguro que quieres eliminar a <strong>{{ object.nombre_completo }}</strong>? Esta acción no se puede deshacer.</p>

<form method="post">
    {% csrf_token %}
    <div class="form-actions">
        <button type="submit" class="btn-danger">Sí, eliminar</button>
        <a href="{% url 'clientes:index' %}" class="btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
