{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acceso Corporativo eemoney - Cloud Tech System.">
    <title>eemoneey | Acceso Corporativo</title>
    <!-- Google Fonts: Plus Jakarta Sans for UI and Outfit for headings -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Conexión al archivo CSS -->
    <link rel="stylesheet" href="{% static 'css/login/login.css' %}">
</head>
<body>

<!-- Contenedor de la tarjeta central -->
<main class="login-card">




    <!-- Cabecera de la marca Cloud Tech System -->
    <header class="login-card-header">
        <!-- Logo de la empresa (Nube SVG Premium) -->
        <div class="logo-container-cloud">
            <svg viewBox="0 0 100 100" class="brand-logo-svg">
                <!-- Cuerpo de la nube -->
                <path d="M 25 65 A 15 15 0 0 1 30 38 A 22 22 0 0 1 70 36 A 15 15 0 0 1 75 65 Z" fill="none" stroke="currentColor" stroke-width="7" stroke-linejoin="round" stroke-linecap="round" />
                <!-- Flecha de crecimiento financiero -->
                <path d="M 40 52 L 48 44 L 54 50 L 62 40 M 56 40 H 62 V 46" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>
        
        <h1 class="login-card-title">eemoneey</h1>
        <p class="login-card-subtitle">Cloud Tech System &bull; Acceso Corporativo</p>
    </header>

    <!-- Formulario de Ingreso -->
    <form id="login-form" method="post" action="{% url 'usuarios:login' %}" novalidate>
        {% csrf_token %}

        <!-- Alerta de Error General -->
        <div class="alert-error" id="general-error" {% if not form.errors %}style="display: none;"{% endif %}>
            Usuario o contraseña incorrectos. Verifique los datos de acceso.
        </div>

        <div class="input-group">
            <label for="username">Usuario o Correo</label>
            <div class="input-wrapper">
                <input type="text" id="username" name="username" placeholder="ejemplo@cloudtech.com" value="{{ form.username.value|default_if_none:'' }}" required>
            </div>
            <span class="error-message" id="username-error"></span>
        </div>

        <div class="input-group">
            <div class="label-wrapper">
                <label for="password">Contraseña</label>
                <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
            </div>
            <div class="input-wrapper">
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <button type="button" class="password-toggle" id="password-toggle" aria-label="Ver contraseña">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <span class="error-message" id="password-error"></span>
        </div>

        <div class="login-options">
            <label class="remember-me">
                <input type="checkbox" id="remember">
                <span class="checkbox-custom"></span>
                Recordar cuenta
            </label>
        </div>

        <button type="submit" class="btn-submit" id="btn-login">
            <span class="btn-text">Ingresar</span>
            <div class="spinner" id="login-spinner" style="display: none;"></div>
        </button>

    </form>

</main>

<!-- Esta es la conexión al archivo JavaScript -->
<script src="{% static 'js/login/login.js' %}"></script>

</body>
</html>
