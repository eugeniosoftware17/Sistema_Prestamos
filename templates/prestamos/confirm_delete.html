{% extends "base.html" %}

{% block title %}Eliminar préstamo{% endblock %}

{% block content %}
<h1>Eliminar préstamo</h1>
<p>¿Seguro que quieres eliminar el préstamo de <strong>{{ object.cliente }}</strong> por <strong>{{ object.monto }}</strong>? Esta acción no se puede deshacer.</p>

<form method="post">
    {% csrf_token %}
    <div class="form-actions">
        <button type="submit" class="btn-danger">Sí, eliminar</button>
        <a href="{% url 'prestamos:index' %}" class="btn-secondary">Cancelar</a>
    </div>
</form>
{% endblock %}
